apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: docker.io/envoyproxy
    chart: gateway-helm
    targetRevision: v1.5.4
    helm:
      releaseName: envoy-gateway
      values: |
        # Don't install Gateway API CRDs — they're managed by gateway-api-crds Application
        crds:
          gatewayAPI:
            enabled: false
        # Don't install Envoy Gateway's own CRDs from this chart either; let the chart's
        # CRD management work normally for envoy-specific CRDs (envoyproxies, etc.)
        # We're only disabling the upstream Gateway API CRDs.

  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
