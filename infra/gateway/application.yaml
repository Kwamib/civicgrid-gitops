apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-class
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Kwamib/civicgrid-gitops.git
    targetRevision: main
    path: infra/gateway
    directory:
      include: gatewayclass.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
