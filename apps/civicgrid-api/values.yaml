# Values overrides for civicgrid-api on minikube.
# These override defaults in charts/civicgrid-api/values.yaml.

image:
  tag: "latest"
  pullPolicy: Always

# Reference the Secret created out-of-band via kubectl.
# Setting database.url to "" prevents the chart from creating its own Secret.
database:
  url: ""
  existingSecret: civicgrid-database
  existingSecretKey: DATABASE_URL

replicaCount: 1
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
